services:
  mcp-server:
    build: .
    container_name: pulse-assistant-mcp-server
    ports:
      - "${MCP_PORT:-8081}:${MCP_PORT:-8081}"
    environment:
      MCP_TRANSPORT: "${MCP_TRANSPORT:-sse}"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "${MCP_PORT:-8081}"
      MCP_ALLOWED_HOSTS: "${MCP_ALLOWED_HOSTS:-}"
    volumes:
      # Read-write: host-side edits show up live (hot-reload), and confirmed
      # writes from the server persist back to these files, visible on the host.
      - ./data:/app/data
    restart: unless-stopped
